# Summary: Runs the complete cross-platform quality and package validation gates.
# Why: Blocks regressions before changes merge into protected branches.

name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - stable

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"

jobs:
  scope:
    name: CI Scope
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      scope: ${{ steps.classify.outputs.scope }}

    steps:
      - name: Check out repository history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: classify
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]] || ! git cat-file -e "$BASE_SHA^{commit}"; then
            scope="full"
          else
            scope="$(git diff --name-only --diff-filter=ACDMR "$BASE_SHA" HEAD -- | python scripts/ci_scope.py)"
          fi
          echo "scope=$scope" >> "$GITHUB_OUTPUT"

  docs-quality:
    name: Documentation Quality
    needs: scope
    if: needs.scope.outputs.scope == 'docs'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version: "0.11.23"

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Run documentation quality gate
        run: scripts/checks.sh docs

  python-quality:
    name: Python Quality
    needs: scope
    if: needs.scope.outputs.scope == 'full'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version: "0.11.23"

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Run Python quality gates
        run: scripts/checks.sh py

      - name: Check for generated diffs
        run: git diff --exit-code

  api-client:
    name: API Schema And Client Drift
    needs: scope
    if: needs.scope.outputs.scope == 'full'
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version: "0.11.23"

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Check generated API client
        run: scripts/checks.sh api

      - name: Check for generated diffs
        run: git diff --exit-code

  frontend-quality:
    name: Frontend Quality
    needs: scope
    if: needs.scope.outputs.scope == 'full'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version: "0.11.23"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend quality gates
        run: scripts/checks.sh web

      - name: Check for generated diffs
        run: git diff --exit-code

  browser-e2e:
    name: Chromium Keyboard And Axe E2E
    needs: scope
    if: needs.scope.outputs.scope == 'full'
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version: "0.11.23"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install pinned Chromium
        working-directory: web
        run: npm exec -- playwright install --with-deps chromium

      - name: Run browser E2E
        run: scripts/checks.sh e2e-ci

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: playwright-report-${{ github.sha }}
          path: web/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  package-evidence:
    name: Linux Package Evidence
    needs: scope
    if: needs.scope.outputs.scope == 'full'
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version: "0.11.23"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build and audit package evidence
        run: scripts/checks.sh package

      - name: Upload package evidence
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: web-package-evidence-${{ github.sha }}
          path: build/web-package-evidence/
          if-no-files-found: error
          retention-days: 14

  windows-runtime-boundaries:
    name: Windows Runtime Boundaries
    needs: scope
    if: needs.scope.outputs.scope == 'full'
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version: "0.11.23"

      - name: Install locked test dependencies
        run: uv sync --locked --dev

      - name: Test Windows filesystem and desktop runtime boundaries
        run: >-
          uv run pytest
          tests/adapters/fs/test_exclusive_operation_lock.py
          tests/adapters/fs/test_file_observation.py
          tests/adapters/fs/test_win32_file_handles.py
          tests/adapters/fs/test_win32_file_observation.py
          tests/features/test_companion_adapter_e2e.py
          tests/features/test_unprocessed_adapter_e2e.py
          tests/adapters/desktop
          tests/platform/test_desktop_entry_point.py
          tests/platform/test_desktop_runtime.py
          -q

      - name: Test Windows scanner containment
        run: >-
          uv run pytest
          tests/adapters/fs/test_read_adapters.py
          -q
          -k "file_scanner or file_stat_reader"

  windows-package-smoke:
    name: Windows Desktop Package And Native Smoke
    needs: [scope, package-evidence]
    if: needs.scope.outputs.scope == 'full'
    runs-on: windows-2025
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version: "0.11.23"

      - name: Install locked build dependencies
        run: uv sync --locked --no-default-groups

      - name: Download audited package evidence
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: web-package-evidence-${{ github.sha }}
          path: build/web-package-evidence

      - name: Smoke installed wheel
        shell: pwsh
        run: |
          $wheel = Get-ChildItem build/web-package-evidence -Filter *.whl -File | Select-Object -First 1
          if ($null -eq $wheel) { throw "Audited wheel was not downloaded." }
          python scripts/web/smoke_web_wheel.py --wheel $wheel.FullName

      - name: Build and smoke native desktop archive
        shell: pwsh
        run: |
          $wheel = Get-ChildItem build/web-package-evidence -Filter *.whl -File | Select-Object -First 1
          if ($null -eq $wheel) { throw "Audited wheel was not downloaded." }
          uv run --no-sync python scripts/desktop/build_windows.py --wheel $wheel.FullName --output-directory build/desktop
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $archive = Get-ChildItem build/desktop -Filter OMYM2-*-windows-x86_64.zip -File | Select-Object -First 1
          if ($null -eq $archive) { throw "Desktop archive was not produced." }
          uv run --no-sync python scripts/desktop/smoke_windows_package.py --archive $archive.FullName --wheel $wheel.FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $smoke = Get-ChildItem build/desktop -Filter OMYM2-*-windows-x86_64-smoke.json -File | Select-Object -First 1
          if ($null -eq $smoke) { throw "Desktop native-smoke evidence was not produced." }

      - name: Upload native desktop evidence and diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: omym2-desktop-windows-x86_64-evidence-${{ github.sha }}
          path: |
            build/desktop/*.json
            build/desktop/*.sha256
            build/desktop/*-diagnostics/**
          if-no-files-found: warn
          retention-days: 14

  performance-budget:
    name: Installed Package Performance Budgets
    needs: [scope, package-evidence]
    if: needs.scope.outputs.scope == 'full'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      OMYM2_PERFORMANCE_OUTPUT: ../build/web-package-evidence/performance.json

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version: "0.11.23"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install pinned Chromium
        working-directory: web
        run: npm exec -- playwright install --with-deps chromium

      - name: Download audited package evidence
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: web-package-evidence-${{ github.sha }}
          path: build/web-package-evidence

      - name: Enforce installed-package performance budgets
        shell: bash
        run: |
          wheel="$(find build/web-package-evidence -maxdepth 1 -name '*.whl' -type f -print -quit)"
          if [[ -z "$wheel" ]]; then
            echo "Audited wheel was not downloaded." >&2
            exit 1
          fi
          scripts/checks.sh performance-ci "$wheel"

      - name: Upload performance measurement
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: web-performance-${{ github.sha }}
          path: build/web-package-evidence/performance.json
          if-no-files-found: error
          retention-days: 14
