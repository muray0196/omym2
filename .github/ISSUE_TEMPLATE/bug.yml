name: Bug
description: Track defects against current specs.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed defect.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Link the authoritative spec when possible.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Describe what happened instead.
    validations:
      required: true
  - type: textarea
    id: authoritative_docs
    attributes:
      label: Authoritative docs to read
      description: Link relevant architecture, execution, storage, command, or testing docs.
    validations:
      required: true
  - type: textarea
    id: affected_areas
    attributes:
      label: Affected areas
      description: List impacted source and test areas.
    validations:
      required: true
  - type: textarea
    id: invariants
    attributes:
      label: Invariants that must not be violated
      description: Include any Plan, FileEvent, dependency, path, identity, storage, or status rules.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest known reproduction or state why none is available.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: List the required fix behavior.
    validations:
      required: true
  - type: textarea
    id: verification_commands
    attributes:
      label: Verification commands
      description: Include focused regression tests and relevant final gates.
    validations:
      required: true
  - type: textarea
    id: documentation_updates
    attributes:
      label: Documentation updates required
      description: State whether specs need updates.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Blocking / blocked-by issues
      description: Link direct blockers or blocked work.
    validations:
      required: true
