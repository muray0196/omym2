name: Documentation
description: Track durable documentation changes.
title: "[Docs] "
labels:
  - docs
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - docs
        - architecture
        - storage
        - execution
        - agent
        - test
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: State the durable documentation outcome.
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: State what should not be added, such as active progress tracking or end-user manual material.
    validations:
      required: true
  - type: textarea
    id: authoritative_docs
    attributes:
      label: Authoritative docs to read
      description: Link the current authoritative docs and routers.
    validations:
      required: true
  - type: textarea
    id: affected_docs
    attributes:
      label: Affected docs
      description: List files expected to change.
    validations:
      required: true
  - type: textarea
    id: rules
    attributes:
      label: Ownership and duplication rules
      description: State the authoritative home for each durable rule and which sections are summaries.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: List required doc structure, links, and routing outcomes.
    validations:
      required: true
  - type: textarea
    id: verification_commands
    attributes:
      label: Verification commands
      description: Include link/search checks and any quality gates that apply.
    validations:
      required: true
  - type: textarea
    id: documentation_updates
    attributes:
      label: Documentation updates required
      description: Name follow-on docs or state none.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Blocking / blocked-by issues
      description: Link direct blockers or blocked work.
    validations:
      required: true
